<body style="word-spacing:normal;background-color:#f0fdf4;">
  <div style="display:none;font-size:1px;color:#ffffff;line-height:1px;max-height:0px;max-width:0px;opacity:0;overflow:hidden;">Your secure sign-in link for How Much Mate.</div>
  <div aria-label="Sign in to How Much Mate" aria-roledescription="email" role="article" lang="und" dir="auto" style="word-spacing:normal;background-color:#f0fdf4;">
    <!--[if mso | IE]><table align="center" border="0" cellpadding="0" cellspacing="0" class="" role="presentation" style="width:600px;" width="600" ><tr><td style="line-height:0px;font-size:0px;mso-line-height-rule:exactly;"><![endif]-->

      <table align="center" border="0" cellpadding="0" cellspacing="0" role="presentation" style="width:100%;">

          <tr>

              <!--[if mso | IE]><table role="presentation" border="0" cellpadding="0" cellspacing="0"><tr><td class="" style="vertical-align:top;width:560px;" ><![endif]-->
              <div class="mj-column-px-560 mj-outlook-group-fix" style="font-size:0px;text-align:left;direction:ltr;display:inline-block;vertical-align:top;width:100%;">
                <table border="0" cellpadding="0" cellspacing="0" role="presentation" width="100%" style="border-collapse:separate;">
                  <tbody>
                    <tr>
                      <td style="background-color:#ffffff;border-radius:14px;vertical-align:top;border-collapse:separate;padding:0;">
                        <table border="0" cellpadding="0" cellspacing="0" role="presentation" style width="100%">
                          <tbody>
                            <tr>
                              <td align="center" style="font-size:0px;padding:28px 28px 10px;word-break:break-word;">
                                <div style="font-family:Helvetica, Arial, sans-serif;font-size:22px;font-weight:700;line-height:1.6;text-align:center;color:#14532d;">How Much Mate</div>
                              </td>
                            </tr>
                            <tr>
                              <td align="center" style="font-size:0px;padding:0 28px 8px;word-break:break-word;">
                                <div style="font-family:Helvetica, Arial, sans-serif;font-size:18px;font-weight:600;line-height:1.6;text-align:center;color:#1f2937;">Sign in to your account</div>
                              </td>
                            </tr>
                            <tr>
                              <td align="center" style="font-size:0px;padding:0 28px 20px;word-break:break-word;">
                                <div style="font-family:Helvetica, Arial, sans-serif;font-size:16px;line-height:1.6;text-align:center;color:#1f2937;">Use the secure button below to continue.</div>
                              </td>
                            </tr>
                            <tr>
                              <td align="center" style="font-size:0px;padding:0 28px 24px;word-break:break-word;">
                                <table border="0" cellpadding="0" cellspacing="0" role="presentation" style="border-collapse:separate;line-height:100%;">
                                  <tbody>
                                    <tr>
                                      <td align="center" bgcolor="#0f766e" role="presentation" style="border:none;border-radius:8px;cursor:auto;mso-padding-alt:14px 24px;background:#0f766e;" valign="middle">
                                        <a href="{{ .Link }}" style="display:inline-block;background:#0f766e;color:#ffffff;font-family:Helvetica, Arial, sans-serif;font-size:16px;font-weight:normal;line-height:120%;margin:0;text-decoration:none;text-transform:none;padding:14px 24px;mso-padding-alt:0px;border-radius:8px;" target="_blank"> Sign in now </a>
                                      </td>
                                    </tr>
                                  </tbody>
                                </table>
                              </td>
                            </tr>
                            <tr>

                                <div style="font-family:Helvetica, Arial, sans-serif;font-size:13px;line-height:1.6;text-align:center;color:#065f46;">Prefer entering a one-time code?</div>
                              </td>
                            </tr>
                            <tr>
                              <td align="center" class="token" style="letter-spacing: 6px; font-weight: 700; color: #0f766e; font-size: 0px; padding: 0 28px 18px; word-break: break-word;">
                                <div style="font-family:Helvetica, Arial, sans-serif;font-size:16px;line-height:1.6;text-align:center;color:#1f2937;">{{ .Token }}</div>
                              </td>
                            </tr>
                            <tr>
                              <td align="center" style="font-size:0px;padding:0 28px 28px;word-break:break-word;">
                                <div style="font-family:Helvetica, Arial, sans-serif;font-size:13px;line-height:1.6;text-align:center;color:#4b5563;">This link or code expires soon. If you did not request this sign-in, you can safely ignore this email.</div>
                              </td>
                            </tr>

                      </td>
                    </tr>
